services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       digital_office
      POSTGRES_USER:     digital_office
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U digital_office"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  10

  api:
    build:
      context:    .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:             postgresql://digital_office:${POSTGRES_PASSWORD}@postgres:5432/digital_office
      REDIS_URL:                redis://redis:6379
      API_PORT:                 "3001"
      API_SECRET_KEY:           ${API_SECRET_KEY}
      ANTHROPIC_API_KEY:        ${ANTHROPIC_API_KEY}
      DASHBOARD_ORIGIN:         http://${HOST:-localhost}:3000
      OPENCLAW_API_KEY:         ${OPENCLAW_API_KEY}
      OPENCLAW_WEBHOOK_SECRET:  ${OPENCLAW_WEBHOOK_SECRET}
      META_APP_ID:              ${META_APP_ID}
      META_APP_SECRET:          ${META_APP_SECRET}
      META_ACCESS_TOKEN:        ${META_ACCESS_TOKEN}
      META_PAGE_ID:             ${META_PAGE_ID}
      META_IG_ACCOUNT_ID:       ${META_IG_ACCOUNT_ID}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context:    .
      dockerfile: apps/dashboard/Dockerfile
      args:
        API_URL: http://api:3001
    restart: unless-stopped
    environment:
      API_URL:              http://api:3001
      NEXT_PUBLIC_WS_URL:   ws://${HOST:-localhost}:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
